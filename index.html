<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mega Launcher | VisionX Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #00f2ff;
            --secondary: #7000ff;
            --dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--dark); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }
        
        /* Background Tech Animation */
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        /* Welcome Screen */
        .hero-input {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #101010 0%, #000 100%);
            text-align: center; border-bottom: 2px solid var(--accent);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; color: var(--accent); text-shadow: 0 0 20px var(--accent); margin-bottom: 20px; }

        .search-area {
            background: var(--glass); padding: 40px; border-radius: 30px;
            backdrop-filter: blur(20px); border: 1px solid rgba(0, 242, 255, 0.2);
            width: 90%; max-width: 600px;
        }

        input {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: #000; color: var(--accent); font-size: 1.5rem;
            text-align: center; outline: none; border-bottom: 3px solid var(--secondary);
            margin-bottom: 20px;
        }

        .main-btn {
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            color: #000; padding: 15px 50px; border-radius: 50px; font-weight: 900;
            border: none; cursor: pointer; font-size: 1.2rem; transition: 0.4s;
        }
        .main-btn:hover { transform: scale(1.1) rotate(2deg); box-shadow: 0 0 30px var(--accent); }

        /* AI Output Sections */
        .output-container { display: none; padding: 50px 5%; }

        .section-card {
            background: var(--glass); border-radius: 25px; padding: 40px;
            margin-bottom: 50px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }

        /* الميزة الأساسية: المنتج الطائر */
        .product-hero {
            display: flex; align-items: center; justify-content: space-around;
            flex-wrap: wrap; min-height: 500px;
        }
        .flying-box {
            width: 350px; height: 500px; position: relative;
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 30px var(--accent));
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-40px) rotate(8deg); }
        }
        .flying-box img { width: 100%; height: 100%; object-fit: contain; }

        /* البوسترات */
        .poster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .poster-item { background: #000; padding: 10px; border-radius: 20px; border: 1px solid #222; transition: 0.3s; }
        .poster-item:hover { border-color: var(--accent); transform: translateY(-10px); }
        .poster-item img { width: 100%; border-radius: 15px; }

        /* برومبتات AI */
        pre {
            background: #0a0a0a; color: #00ff88; padding: 25px;
            border-radius: 15px; border-left: 5px solid var(--accent);
            white-space: pre-wrap; font-family: 'Courier New', monospace;
            font-size: 0.9rem; margin-top: 15px;
        }

        .copy-btn {
            background: #222; color: #fff; border: none; padding: 8px 20px;
            border-radius: 5px; margin-top: 10px; cursor: pointer; float: left;
        }

        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .spinner { width: 80px; height: 80px; border: 5px solid #111; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <h2 style="margin-top:20px; color:var(--accent)">جاري تشغيل محرك الذكاء الاصطناعي...</h2>
    <p id="loading-status">يتم الآن بناء الموقع وتوليد الصور</p>
</div>

<section class="hero-input">
    <h1 data-aos="zoom-in">VISION X STUDIO</h1>
    <div class="search-area">
        <p style="margin-bottom: 15px;">اكتب اسم المنتج وسنقوم بالباقي</p>
        <input type="text" id="productInput" placeholder="مثلاً: Cleaner">
        <button class="main-btn" onclick="startGeneration()">إطلاق الحملة المتكاملة</button>
    </div>
</section>

<div id="output" class="output-container">
    
    <div class="section-card" id="site-section">
        <div class="product-hero" id="dynamic-site-body">
            </div>
    </div>

    <div class="section-card">
        <h2 style="color:var(--accent); margin-bottom: 30px;"><i class="fas fa-images"></i> بوسترات دعائية (AI Generated)</h2>
        <div class="poster-grid">
            <div class="poster-item">
                <img id="poster1" src="" alt="Poster 1">
                <p id="p1-desc" style="padding:15px; font-size:0.8rem;"></p>
            </div>
            <div class="poster-item">
                <img id="poster2" src="" alt="Poster 2">
                <p id="p2-desc" style="padding:15px; font-size:0.8rem;"></p>
            </div>
        </div>
    </div>

    <div class="section-card">
        <h2 style="color:var(--accent)"><i class="fas fa-play-circle"></i> برومبت إعلان HeyGen (دقيقة واحدة)</h2>
        <p>انسخ هذا النص وضعه في HeyGen مع صورة المنتج لتحصل على فيديو خرافي:</p>
        <pre id="heygen-prompt-text"></pre>
        <button class="copy-btn" onclick="copyPrompt()">نسخ البرومبت</button>
    </div>

</div>

<script>
    const API_KEY = "AIzaSyBFLO8DHtRiC259kQqYqPtxKGccww6OAQ4";

    async function startGeneration() {
        const pName = document.getElementById('productInput').value;
        if(!pName) return alert("الرجاء كتابة اسم المنتج");

        document.getElementById('loader').style.display = 'flex';
        
        try {
            // الطلب العملاق لـ Gemini
            const mainPrompt = `As an expert full-stack developer and marketer, create a complete branding package for the product "${pName}".
            Return ONLY a valid JSON object with these exact keys:
            - "title": A catchy marketing title in Arabic.
            - "slogan": A powerful Arabic slogan.
            - "description": A 2-sentence Arabic description.
            - "features": An array of 3 unique features (Arabic).
            - "image_prompt_cinematic": A super-detailed English prompt for a cinematic product poster.
            - "image_prompt_minimal": A super-detailed English prompt for a minimalist product poster.
            - "heygen_script": A professional 60-second video script and prompt for HeyGen AI in English.
            - "color_theme": A hex color code that fits the product.`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: mainPrompt }] }] })
            });

            const data = await response.json();
            const resultText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '');
            const ai = JSON.parse(resultText);

            // 1. بناء الموقع ديناميكياً
            document.getElementById('dynamic-site-body').innerHTML = `
                <div style="max-width:500px">
                    <h1 style="color:${ai.color_theme}; font-size:4rem">${pName}</h1>
                    <h2 style="margin-bottom:20px">${ai.slogan}</h2>
                    <p style="font-size:1.2rem; color:#aaa">${ai.description}</p>
                    <ul style="margin-top:30px; list-style:none">
                        ${ai.features.map(f => `<li style="margin-bottom:10px"><i class="fas fa-check" style="color:${ai.color_theme}"></i> ${f}</li>`).join('')}
                    </ul>
                </div>
                <div class="flying-box">
                    <img src="https://pollinations.ai/p/${encodeURIComponent(ai.image_prompt_cinematic)}?width=800&height=1200&seed=1" alt="Product">
                </div>
            `;

            // 2. تحديث البوسترات
            document.getElementById('poster1').src = `https://pollinations.ai/p/${encodeURIComponent(ai.image_prompt_cinematic)}?width=800&height=1000&seed=123`;
            document.getElementById('p1-desc').innerText = ai.image_prompt_cinematic;
            
            document.getElementById('poster2').src = `https://pollinations.ai/p/${encodeURIComponent(ai.image_prompt_minimal)}?width=800&height=1000&seed=456`;
            document.getElementById('p2-desc').innerText = ai.image_prompt_minimal;

            // 3. تحديث برومبت HeyGen
            document.getElementById('heygen-prompt-text').innerText = ai.heygen_script;

            // إظهار النتائج
            document.getElementById('output').style.display = 'block';
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });

        } catch (error) {
            console.error(error);
            alert("حدث خطأ أثناء التوليد. تأكد من اتصال الإنترنت.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function copyPrompt() {
        const text = document.getElementById('heygen-prompt-text').innerText;
        navigator.clipboard.writeText(text);
        alert("تم نسخ برومبت HeyGen بنجاح!");
    }
</script>

</body>
</html>
